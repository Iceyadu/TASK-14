server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: exam-scheduling

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:exam_scheduling}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:${DB_USER:root}}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.eaglepoint.exam: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: INFO
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  security:
    bcrypt-strength: ${BCRYPT_STRENGTH:12}
    session-timeout-minutes: ${SESSION_TIMEOUT_MINUTES:30}
    remember-device-days: ${REMEMBER_DEVICE_DAYS:7}
    max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:5}
    lockout-duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}
    password-history-count: ${PASSWORD_HISTORY_COUNT:5}
    nonce-expiry-seconds: ${NONCE_EXPIRY_SECONDS:120}
    require-request-signing: ${REQUIRE_REQUEST_SIGNING:true}
  rate-limit:
    user-per-minute: ${RATE_LIMIT_USER_PER_MINUTE:60}
    ip-per-minute: ${RATE_LIMIT_IP_PER_MINUTE:300}
  signing-secret: ${APP_SIGNING_SECRET:${SIGNING_SECRET:change-this-signing-secret-in-production-min-32-chars}}
  encryption:
    aes-key: ${AES_ENCRYPTION_KEY:${APP_ENCRYPTION_KEY:changeThisToA32ByteBase64Key==}}
  import:
    max-file-size-mb: ${IMPORT_MAX_FILE_SIZE_MB:10}
    batch-size: ${IMPORT_BATCH_SIZE:500}
  notification:
    retry-max-attempts: ${NOTIFICATION_RETRY_MAX:3}
    retry-delay-seconds: ${NOTIFICATION_RETRY_DELAY_SECONDS:60}
  job:
    node-id: ${JOB_NODE_ID:node-1}
    poll-interval-seconds: ${JOB_POLL_INTERVAL_SECONDS:10}
  wechat:
    mode: ${WECHAT_MODE:disabled}
    enabled: ${WECHAT_ENABLED:false}
    http:
      endpoint: ${WECHAT_HTTP_ENDPOINT:}
